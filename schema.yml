components:
  schemas:
    AdminUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        is_active:
          type: boolean
          title: Actif
          description: Précise si l’utilisateur doit être considéré comme actif. Décochez
            ceci plutôt que de supprimer le compte.
        verification_status:
          $ref: '#/components/schemas/VerificationStatusEnum'
        date_joined:
          type: string
          format: date-time
          title: Date d’inscription
        submitted_documents:
          type: string
          readOnly: true
      required:
      - email
      - full_name
      - id
      - submitted_documents
    AdminUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        is_active:
          type: boolean
          title: Actif
          description: Précise si l’utilisateur doit être considéré comme actif. Décochez
            ceci plutôt que de supprimer le compte.
        verification_status:
          $ref: '#/components/schemas/VerificationStatusEnum'
        date_joined:
          type: string
          format: date-time
          title: Date d’inscription
      required:
      - email
    Antecedent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        type:
          $ref: '#/components/schemas/TypeEnum'
        description:
          type: string
        date_diagnosis:
          type: string
          format: date
          nullable: true
        patient:
          type: integer
      required:
      - id
      - name
      - patient
      - type
    AntecedentRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        type:
          $ref: '#/components/schemas/TypeEnum'
        description:
          type: string
        date_diagnosis:
          type: string
          format: date
          nullable: true
        patient:
          type: integer
      required:
      - name
      - patient
      - type
    Appointment:
      type: object
      description: |-
        Utilisé en GET /api/appointments/ et GET /api/appointments/{id}/
        Visible par le patient — pas de refusal_reason.
      properties:
        id:
          type: integer
          readOnly: true
        doctor_name:
          type: string
          readOnly: true
        doctor_specialty:
          type: string
          readOnly: true
        patient_name:
          type: string
          readOnly: true
        date:
          type: string
          format: date
          readOnly: true
        start_time:
          type: string
          format: time
          readOnly: true
        end_time:
          type: string
          format: time
          readOnly: true
        duration_minutes:
          type: integer
          readOnly: true
        motif:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusE5cEnum'
          readOnly: true
        status_display:
          type: string
          readOnly: true
        notes:
          type: string
          readOnly: true
        has_review:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date
      - doctor_name
      - doctor_specialty
      - duration_minutes
      - end_time
      - has_review
      - id
      - motif
      - notes
      - patient_name
      - start_time
      - status
      - status_display
      - updated_at
    AppointmentDoctor:
      type: object
      description: |-
        Utilisé dans toutes les vues doctor/appointments/
        Ajoute refusal_reason et les infos patient complètes.
      properties:
        id:
          type: integer
          readOnly: true
        patient_name:
          type: string
          readOnly: true
        patient_email:
          type: string
          format: email
          readOnly: true
        patient_phone:
          type: string
          readOnly: true
        date:
          type: string
          format: date
          readOnly: true
        start_time:
          type: string
          format: time
          readOnly: true
        end_time:
          type: string
          format: time
          readOnly: true
        duration_minutes:
          type: integer
          readOnly: true
        motif:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusE5cEnum'
          readOnly: true
        status_display:
          type: string
          readOnly: true
        notes:
          type: string
          readOnly: true
        refusal_reason:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date
      - duration_minutes
      - end_time
      - id
      - motif
      - notes
      - patient_email
      - patient_name
      - patient_phone
      - refusal_reason
      - start_time
      - status
      - status_display
      - updated_at
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        level:
          $ref: '#/components/schemas/LevelEnum'
        message:
          type: string
          maxLength: 255
        actor_name:
          type: string
          readOnly: true
          default: Système
        ip_address:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - actor_name
      - created_at
      - id
      - message
    BlankEnum:
      enum:
      - ''
