          type: string
          format: date-time
          readOnly: true
        messages:
          type: array
          items:
            $ref: '#/components/schemas/CareMessage'
          readOnly: true
        patient_medical_dossier:
          type: string
          readOnly: true
      required:
      - caretaker
      - caretaker_name
      - created_at
      - id
      - messages
      - patient
      - patient_medical_dossier
      - patient_message
      - patient_name
      - start_date
      - status
    CareRequestRequest:
      type: object
      properties:
        caretaker:
          type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        patient_message:
          type: string
          minLength: 1
          description: Détails des tâches et besoins médicaux
      required:
      - caretaker
      - patient_message
      - start_date
    CareStatusEnum:
      enum:
      - pending
      - accepted
      - rejected
      - completed
      - cancelled
      type: string
      description: |-
        * `pending` - En attente
        * `accepted` - Acceptée
        * `rejected` - Refusée
        * `completed` - Terminée
        * `cancelled` - Annulée
    CaretakerProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          readOnly: true
        certification:
          type: string
          maxLength: 200
        experience_years:
          type: integer
          maximum: 2147483647
          minimum: 0
        bio:
          type: string
        availability_area:
          type: string
          maxLength: 200
        is_verified:
          type: boolean
        is_available:
          type: boolean
          description: Visible dans les recherches des patients
        services:
          type: array
          items:
            $ref: '#/components/schemas/CaretakerService'
          readOnly: true
      required:
      - full_name
      - id
      - services
    CaretakerService:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        service_name:
          type: string
          maxLength: 200
        price_per_hour:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        description:
          type: string
        caretaker:
          type: integer
      required:
      - caretaker
      - id
      - service_name
    CategoryEnum:
      enum:
      - cardio
      - diabetes
