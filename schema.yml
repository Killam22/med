        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
        motif:
          type: string
          maxLength: 300
      required:
      - date
      - doctor_id
      - end_time
      - motif
      - start_time
    BookAppointmentRequest:
      type: object
