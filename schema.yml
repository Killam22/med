        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
      - id
      - sender
      - sender_name
    CareMessageRequest:
      type: object
      properties:
        sender:
          type: integer
        content:
          type: string
          minLength: 1
      required:
      - content
      - sender
    CareRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        patient:
          type: integer
          readOnly: true
        patient_name:
          type: string
          readOnly: true
        caretaker:
          type: integer
        caretaker_name:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/CareStatusEnum'
          readOnly: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        patient_message:
          type: string
