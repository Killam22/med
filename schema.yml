              schema:
                $ref: '#/components/schemas/AdminUser'
          description: ''
    delete:
      operationId: admin_users_destroy
      description: Endpoints pour 'Validation des inscriptions' et 'Gestion Utilisateurs'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Utilisateur.
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
