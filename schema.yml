openapi: 3.0.3
info:
  title: MedSmart API
  version: 1.0.0
  description: Documentation complète de l'API pour la plateforme médicale MedSmart
    (PFE).
paths:
  /api/admin/audit-logs/:
    get:
      operationId: admin_audit_logs_list
      description: Endpoint pour l'écran 'Journal d'Audit'
      parameters:
      - in: query
        name: level
        schema:
          type: string
          enum:
          - error
          - info
          - success
          - warning
        description: |-
          * `success` - Succès
          * `warning` - Alerte
          * `error` - Erreur
          * `info` - Info
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogList'
          description: ''
  /api/admin/audit-logs/{id}/:
    get:
      operationId: admin_audit_logs_retrieve
      description: Endpoint pour l'écran 'Journal d'Audit'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this audit log.
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
          description: ''
  /api/admin/users/:
    get:
      operationId: admin_users_list
      description: Endpoints pour 'Validation des inscriptions' et 'Gestion Utilisateurs'
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - admin
          - caretaker
          - doctor
          - patient
          - pharmacist
        description: |-
          * `patient` - Patient
          * `doctor` - Doctor
          * `pharmacist` - Pharmacist
          * `caretaker` - Caretaker
          * `admin` - Admin
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: verification_status
        schema:
          type: string
          enum:
          - pending
          - rejected
          - unverified
          - verified
        description: |-
          * `unverified` - Non vérifié
          * `pending` - En attente
          * `verified` - Vérifié
          * `rejected` - Rejeté
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminUserList'
          description: ''
    post:
      operationId: admin_users_create
      description: Endpoints pour 'Validation des inscriptions' et 'Gestion Utilisateurs'
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminUserRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
          description: ''
  /api/admin/users/{id}/:
    get:
      operationId: admin_users_retrieve
      description: Endpoints pour 'Validation des inscriptions' et 'Gestion Utilisateurs'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Utilisateur.
