<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedSmart Auth</title>

<style>
body{
  font-family:sans-serif;
  background:#eef3fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:340px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}
h2{text-align:center;margin-bottom:20px}
input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:10px;
  border:none;
  background:#4f7cff;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}
.hidden{display:none}
.link{cursor:pointer;color:#4f7cff;text-align:center;margin-top:8px}

/* ROLE BUTTONS */
.roles{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-bottom:10px;
}
.role-btn{
  padding:8px;
  border:1px solid #ccc;
  border-radius:8px;
  cursor:pointer;
  text-align:center;
}
.role-btn.active{
  background:#4f7cff;
  color:white;
}

/* OTP */
.otp{display:flex;justify-content:center;gap:6px;margin-bottom:10px}
.otp input{
  width:40px;
  text-align:center;
  font-size:18px;
}
</style>
</head>

<body onload="
{% if show_register %} setMode('register'); {% endif %}
{% if show_reset %} setMode('reset'); {% endif %}
{% if show_verify %} setMode('verify'); {% endif %}
{% if show_new_password %} setMode('new'); {% endif %}
">

<div class="box">

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>

<form method="POST" action="{% url 'user_login' %}">
{% csrf_token %}
<input name="email" placeholder="Email" required>
<input name="password" type="password" placeholder="Password" required>
<button>Login</button>
</form>

<div class="link" onclick="setMode('register')">Create account</div>
<div class="link" onclick="setMode('reset')">Forgot password?</div>
</div>

<!-- REGISTER -->
<div id="registerBox" class="hidden">
<h2>Register</h2>

<form method="POST" action="{% url 'register' %}">
{% csrf_token %}

<input name="first_name" placeholder="First name" required>
<input name="last_name" placeholder="Last name" required>
<input name="email" placeholder="Email" required>
<input name="password" type="password" placeholder="Password" required>
<input name="password2" type="password" placeholder="Confirm Password" required>

<!-- ROLE SELECT -->
<div class="roles">
  <div class="role-btn active" onclick="selectRole('patient',this)">Patient</div>
  <div class="role-btn" onclick="selectRole('doctor',this)">Doctor</div>
  <div class="role-btn" onclick="selectRole('pharmacist',this)">Pharmacist</div>
  <div class="role-btn" onclick="selectRole('caretaker',this)">Caretaker</div>
</div>

<input type="hidden" name="role" id="roleInput" value="patient">

<button>Create Account</button>
</form>

<div class="link" onclick="setMode('login')">Back to login</div>
</div>

<!-- RESET EMAIL -->
<div id="resetBox" class="hidden">
<h2>Reset Password</h2>

<form method="POST" action="{% url 'password_reset_request' %}">
{% csrf_token %}
<input name="email" placeholder="Email" required>
<button>Send Code</button>
</form>

<div class="link" onclick="setMode('login')">Back</div>
</div>

<!-- OTP -->
<div id="verifyBox" class="hidden">
<h2>Enter Code</h2>

<p style="text-align:center">{{ verify_email }}</p>

<form method="POST"
action="{% if verify_purpose == 'register' %}{% url 'verify_register_otp' %}{% else %}{% url 'verify_reset_otp' %}{% endif %}">
{% csrf_token %}

<div class="otp">
<input maxlength="1" class="d">
<input maxlength="1" class="d">
<input maxlength="1" class="d">
<input maxlength="1" class="d">
<input maxlength="1" class="d">
<input maxlength="1" class="d">
</div>

<input type="hidden" name="otp" id="otpHidden">

<button>Verify</button>
</form>
</div>

<!-- NEW PASSWORD -->
<div id="newBox" class="hidden">
<h2>New Password</h2>

<form method="POST" action="{% url 'password_reset_set' %}">
{% csrf_token %}
<input name="new_password1" type="password" placeholder="New password" required>
<input name="new_password2" type="password" placeholder="Confirm password" required>
<button>Save</button>
</form>
</div>

</div>

<script>
function hideAll(){
  ['loginBox','registerBox','resetBox','verifyBox','newBox']
  .forEach(id=>document.getElementById(id).classList.add('hidden'));
}

function setMode(mode){
  hideAll();
  if(mode==='login') document.getElementById('loginBox').classList.remove('hidden');
  if(mode==='register') document.getElementById('registerBox').classList.remove('hidden');
  if(mode==='reset') document.getElementById('resetBox').classList.remove('hidden');
  if(mode==='verify') document.getElementById('verifyBox').classList.remove('hidden');
  if(mode==='new') document.getElementById('newBox').classList.remove('hidden');
}

/* ROLE SELECT */
function selectRole(role,el){
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('roleInput').value = role;
}

/* OTP AUTO JOIN */
const inputs = document.querySelectorAll('.d');
const hidden = document.getElementById('otpHidden');

inputs.forEach((input,i)=>{
  input.addEventListener('input',()=>{
    if(input.value && i<5) inputs[i+1].focus();
    hidden.value = [...inputs].map(x=>x.value).join('');
  });
});

/* FORCE DJANGO MODE */
document.addEventListener("DOMContentLoaded", function(){
  {% if show_verify %} setMode('verify'); {% endif %}
  {% if show_reset %} setMode('reset'); {% endif %}
  {% if show_register %} setMode('register'); {% endif %}
  {% if show_new_password %} setMode('new'); {% endif %}
});
</script>

</body>
</html>
